app = "honey-frontend"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile"

[env]
  BACKEND_URL = "https://honey-backend.fly.dev"

[http_service]
  internal_port = 8501
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "15s"
    interval = "30s"
    method = "GET"
    path = "/_stcore/health"
    timeout = "5s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
